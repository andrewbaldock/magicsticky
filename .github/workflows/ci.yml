# CI — run the same verify chain as local on every push + PR: typecheck → backend tests →
# build the web UI → Playwright E2E. The E2E server (e2e/server.ts) self-boots and stubs Google
# sign-in, so no secrets are needed in CI.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (backend + web)
        run: bun run typecheck

      - name: Backend tests
        run: bun test test/

      - name: Build web UI (E2E serves web/dist)
        run: bun run build:web

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: bunx playwright test
