# fly.toml app configuration file generated for magicsticky on 2026-06-17T19:00:52-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'magicsticky'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  MAGICSTICKY_DB = '/data/magicsticky.db'
  MAGICSTICKY_WEB_DIST = '/app/web/dist'
  NODE_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'magicsticky_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
